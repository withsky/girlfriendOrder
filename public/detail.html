<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>菜品详情</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <a href="/" class="back">← 返回点菜</a>
        <h1 id="title">菜品详情</h1>
      </header>

      <section class="card detail">
        <p id="desc"></p>
        <p><strong>辣度：</strong><span id="spice"></span></p>
        <p><strong>点菜次数：</strong><span id="count"></span></p>
      </section>

      <section class="card detail">
        <h2>食材准备</h2>
        <ul id="ingredients"></ul>
      </section>

      <section class="card detail">
        <h2>配料用量</h2>
        <ul id="seasonings"></ul>
      </section>

      <section class="card detail">
        <h2>制作流程</h2>
        <ol id="steps"></ol>
      </section>
    </main>

    <script src="/detail.js"></script>
  </body>
</html>
